name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install and Build 🔧
        run: |
          npm install
          npm run build

      - name: Add Google Search Console Verification 🔍
        run: |
          echo "google-site-verification: google1172ef6a21a93386.html" > dist/google1172ef6a21a93386.html

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
